name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libayatana-appindicator3-dev librsvg2-dev libkrb5-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install krb5

      - name: Set macOS Kerberos paths
        if: runner.os == 'macOS'
        run: |
          echo "CFLAGS=-I$(brew --prefix krb5)/include" >> $GITHUB_ENV
          echo "LDFLAGS=-L$(brew --prefix krb5)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix krb5)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: pnpm install

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DSPanel ${{ github.ref_name }}
          releaseBody: |
            See the [CHANGELOG](https://github.com/Rwx-G/DSPanel/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
