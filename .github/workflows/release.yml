name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Publish portable exe
        run: dotnet publish src/DSPanel/DSPanel.csproj --configuration Release --output publish/portable --self-contained true --runtime win-x64 -p:PublishSingleFile=true

      - name: Create zip archive
        run: Compress-Archive -Path publish/portable/* -DestinationPath DSPanel-${{ github.ref_name }}-win-x64.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DSPanel-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
