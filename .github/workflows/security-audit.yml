name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC

permissions:
  contents: read

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: src-tauri
        run: cargo audit

  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (production)
        run: pnpm audit --prod

  dependency-health:
    name: Critical Dependency Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Check ldap3 maintainer activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Critical Dependency Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for repo in "inejge/ldap3" "kennytm/qrcode-rust"; do
            echo "### $repo" >> $GITHUB_STEP_SUMMARY
            LAST_PUSH=$(gh api "repos/$repo" --jq '.pushed_at')
            DAYS_AGO=$(( ($(date +%s) - $(date -d "$LAST_PUSH" +%s)) / 86400 ))
            OPEN_ISSUES=$(gh api "repos/$repo" --jq '.open_issues_count')
            echo "- Last push: $LAST_PUSH ($DAYS_AGO days ago)" >> $GITHUB_STEP_SUMMARY
            echo "- Open issues: $OPEN_ISSUES" >> $GITHUB_STEP_SUMMARY

            if [ "$DAYS_AGO" -gt 365 ]; then
              echo "::warning::$repo has not been updated in $DAYS_AGO days - consider finding an alternative"
            fi
          done
