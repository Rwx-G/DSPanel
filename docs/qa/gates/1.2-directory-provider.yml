gate: PASS
story: "1.2"
slug: directory-provider
review_date: "2026-03-13"
reviewer: "Quinn (Test Architect)"
author: "Romain G."

summary: >
  Story 1.2 is well implemented. DirectoryProvider trait defines all
  required methods plus get_current_user_groups(). LdapDirectoryProvider
  implements LDAP with GSSAPI, domain auto-detection, rootDSE base DN
  discovery. Mock provider enables comprehensive testing.

acceptance_criteria:
  ac1_trait_defined:
    status: PASS
    evidence: >
      DirectoryProvider trait in services/directory.rs defines
      search_users, search_computers, search_groups, get_user_by_identity,
      get_group_members, plus is_connected, domain_name, base_dn,
      test_connection, and get_current_user_groups.
  ac2_ldap_implementation:
    status: PASS
    evidence: >
      LdapDirectoryProvider in services/ldap_directory.rs implements all
      trait methods using ldap3 crate. Custom ldap_escape function handles
      special characters. LDAP filter construction per search type is
      correct with proper wildcard patterns.
  ac3_domain_auto_detection:
    status: PASS
    evidence: >
      LdapDirectoryProvider::new() reads USERDNSDOMAIN env var.
      connect() queries rootDSE for defaultNamingContext to discover
      base DN. Logs warning when not domain-joined.
  ac4_kerberos_auth:
    status: PASS
    evidence: >
      ldap3 crate configured with gssapi feature in Cargo.toml.
      connect() uses ldap.sasl_gssapi_bind(domain) for Kerberos auth.
  ac5_tauri_state_singleton:
    status: PASS
    evidence: >
      LdapDirectoryProvider created as Arc in lib.rs, stored in
      AppState.directory_provider. Registered via .manage() on
      tauri::Builder. Commands access it via State<AppState>.
  ac6_unit_tests:
    status: PASS
    evidence: >
      MockDirectoryProvider with builder pattern (with_users, with_groups,
      with_failure, etc.). 18+ async tests covering search operations,
      max_results, failure propagation, connection status. LDAP escape
      tests cover all special characters. SearchEntry mapping tests verify
      field extraction.
  ac7_graceful_error_handling:
    status: PASS
    evidence: >
      When domain is None, all search methods return empty Vec without
      error. test_connection returns false. Logs debug message for skipped
      searches. DirectoryError enum provides typed error classification.

test_coverage:
  rust_tests: 30
  assessment: >
    Excellent mock-based test coverage. All trait methods tested through
    MockDirectoryProvider. LdapDirectoryProvider non-domain-joined
    scenarios tested with env var manipulation. Escape function fully
    covered. SearchEntry mapping tested with present and missing attrs.

issues:
  - id: ISS-1.2-01
    severity: low
    type: design
    description: >
      LdapDirectoryProvider::base_dn() always returns None because it
      cannot return a reference to Mutex-protected data. The base DN is
      only available internally after connect(). This is documented with
      a comment but means the trait contract is not fully satisfied.

improvements:
  - id: IMP-1.2-01
    severity: low
    description: >
      Consider using a RwLock<String> or caching the base_dn as an
      Option<String> field (not behind Mutex) to allow base_dn() to
      return a proper reference, fulfilling the trait contract.
  - id: IMP-1.2-02
    severity: low
    description: >
      The connect() method creates a new LDAP connection for every
      operation. While the story says lazy connection is acceptable,
      connection pooling or reuse could improve performance for
      repeated queries. This is noted for future stories.
