    severity: low
    finding: "Story AC #1 text specifies `&DirectoryUser` / `&DirectoryComputer` inputs but those Rust types do not exist (only the generic DirectoryEntry plus the TS-side DirectoryUser). Implementation correctly uses typed projection structs (UserIndicatorInput / ComputerIndicatorInput) per the canonical HealthInput pattern from services/health.rs."
    suggested_action: "Documentation-only update: refresh AC #1 text in a follow-up to formalize the typed projection input convention. Already documented in the Dev Agent Record completion notes."
    blocking: false
  - id: "QA-14.1-003"
    severity: low
    finding: "Story AC #5 says \"A new Tauri command\" (singular) but the implementation exposes four commands (single + batch for user and computer), mirroring the evaluate_health_cmd / evaluate_health_batch pattern. Stronger than the AC."
    suggested_action: "Documentation-only update: refresh AC #5 text to acknowledge the batch variants. Already documented in the Dev Agent Record completion notes."
    blocking: false

