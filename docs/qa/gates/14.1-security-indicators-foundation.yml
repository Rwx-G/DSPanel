residual_risks:
  - id: "R1"
    label: "Severity escalation correctness"
    status: VERIFIED_OK
    notes: "Symmetric pattern in both branches (lines 179-183 and 201-205). 6 dedicated tests cover all combinations including the edge case of adminCount=2 (rare migration leftover that must NOT escalate per AD semantics)."
  - id: "R2"
    label: "is_admin_sdholder_protected helper logic"
    status: VERIFIED_OK
    notes: "Strict equality `admin_count == Some(1)` (line 134-136). Triple-negative coverage: Some(0), Some(2), None. Helper is private (fn, not pub fn) per coding standards."
  - id: "R3"
    label: "RBCD principal extraction via extract_dacl_principals"
    status: VERIFIED_OK_WITH_MINOR_CONCERN
    notes: "Deny / Audit ACEs correctly skipped via the `_` arm (dacl.rs:242-247). Allow types ACCESS_ALLOWED_ACE (0x00) and ACCESS_ALLOWED_OBJECT_ACE (0x05) handled with proper SID-offset arithmetic for variable GUID presence. Bounds-checked. End-to-end coverage via constructed SD blob in security_indicators.rs `computer_rbcd_parses_principals_from_sd_blob`. Minor concern (QA-14.1-001): no dedicated dacl.rs tests for the helper itself - tracked for Story 14.3 or backlog."

nfr_validation:
  security:
    status: PASS
    notes: "Pure function, no I/O. Read-only on already-fetched data. No secrets. description_key is i18n key (not translated string) - removes locale-injection vector. Bounds-checked binary SD parsing prevents panic on malformed input."
  performance:
    status: PASS
    notes: "O(1) per object for UAC checks; O(n) over small SPN/delegation lists; base64 decode + SD walk done once per Rbcd-bearing computer. Batch IPC variants amortize the roundtrip cost over visible list page (50-200 rows in single-digit ms)."
  reliability:
    status: PASS
    notes: "No panics. `.unwrap_or_default()` on base64 / SD parsing failure (commands/security_indicators.rs:248). Defensive empty / invalid b64 covered by tests. No `unwrap()` outside tests."
  maintainability:
    status: PASS
    notes: "Constants documented with ADS_UF names. Mirrors services/health.rs (team familiarity). 21 tests aligned with existing pattern. Public API fully `///` documented."

