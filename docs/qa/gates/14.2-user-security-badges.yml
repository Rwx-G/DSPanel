    - "Optional: add 2 viewport-clamp tests on SecurityIndicatorDot to mirror HealthBadge coverage. Same code pattern; not strictly necessary for current parity. Track for future hardening."
    - "Optional: add a dedicated unit test for the evaluateUserSecurityIndicators single-call wrapper, especially once Stories 14.4-14.6 quick-fix flows add direct callers."
    - "Story 14.3 must escape the metadata field (RBCD allowed_principals SID list, ConstrainedDelegation target_spns) when rendered - those values come from binary security descriptors / multi-valued LDAP attributes and could in theory contain attacker-influenced content. Flag for QA-14.3."

