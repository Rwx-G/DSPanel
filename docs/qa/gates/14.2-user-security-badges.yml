residual_risks:
  - id: "R1"
    label: "Wire-format consistency (camelCase)"
    status: VERIFIED_OK
    notes: "Backend touch-up commit f017f16 added #[serde(rename_all = camelCase)] on SecurityIndicator. All 21 backend unit tests in security_indicators.rs still pass; full lib suite 1624/1624 green. TS types use descriptionKey + highestSeverity consistent with the actual JSON shape. metadata: Record<string, unknown> typed correctly because inner keys are produced via serde_json::json!() literals (snake_case)."
  - id: "R2"
    label: "severityToBadgeVariant correctness (AC #2 escalation correctness path)"
    status: VERIFIED_OK
    notes: "src/types/securityIndicators.ts:64-68 reads ONLY the severity parameter. No kind-keyed map exists in the codebase (grep verified). Test 'uses the indicator severity for the badge variant (escalated Kerberoastable becomes error)' explicitly verifies that severity=Critical on a Kerberoastable produces variant=error - i.e. backend escalation flows through."
  - id: "R3"
    label: "Indicator map cancellation in UserLookup useEffect"
    status: VERIFIED_OK
    notes: "Cancellation flag set in cleanup function (UserLookup.tsx:160-162). Both computeHealth and computeIndicators check if (!cancelled) before setState. handleFilterChange clears both maps on >=3-char filter change. No stale-state path."
  - id: "R4"
    label: "SecurityIndicatorDot accessibility"
    status: VERIFIED_OK
    notes: "tabIndex=0, count-aware aria-label via i18n interpolation, aria-describedby links to tooltip when shown, Enter/Space toggle, Escape close, focus/blur trigger, role=status on dot, role=tooltip on popover. Empty dot returns null (no empty role=status). Native title for badge tooltips is acceptable per Dev Notes line 60 and consistent with existing AdminSDHolder badge pattern."

nfr_validation:
  security:
    status: PASS
    notes: "Pure UI consumer of read-only data. Tooltip text comes from i18n bundles (not raw LDAP), so no XSS path through attacker-controlled attribute values. Indicator kind/descriptionKey are stable enum strings. metadata field exists in TS types but is not rendered in this story (Story 14.3 will render it - flagged for that review to escape RBCD/ConstrainedDelegation principal lists)."
  performance:
    status: PASS
    notes: "Batch IPC over visible page (50-200 users typical) in single-digit ms. O(1) Map lookup at row render. Portal tooltip avoids re-layout on hover. refreshSelectedUser uses Promise.all for parallel health + indicators evaluation. No measurable UX regression expected."
  reliability:
    status: PASS
    notes: "useEffect cancellation flag honored. try/catch around batch IPC degrades to console.warn (no crash). Filter change resets stale maps."
  maintainability:
    status: PASS
    notes: "Mirrors HealthBadge / evaluateHealth patterns - team familiarity. No new abstractions. Adding a 6th indicator only requires backend detection (Story 14.1) plus an i18n key, no UI code change."
  accessibility:
    status: PASS
    notes: "Full keyboard support on the dot (tabIndex, Enter/Space toggle, Escape close, focus/blur). Native title for badge tooltips is acceptable and consistent with existing AdminSDHolder pattern. Empty dot renders null (no empty role=status)."

