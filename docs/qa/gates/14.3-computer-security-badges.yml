    - "Defer until Story 14.6: factor tooltipParamsFor to a shared location if the quick-fix refresh callback needs the same metadata extraction logic. Currently local-to-page is correct."
    - "Backlog: enhance SecurityIndicatorDot popover to show first-N principal SIDs / target SPNs (currently only kind labels). Trade-off: loses the compact look in the lookup row."
    - "Backlog (Epic 14 follow-up): SID-to-name resolution for the Rbcd allowed_principals list. Would maintain XSS safety as long as resolved names continue to flow through title attributes."

