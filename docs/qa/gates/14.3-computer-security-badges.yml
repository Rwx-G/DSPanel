residual_risks:
  - id: "R1"
    label: "DirectoryComputer.rawAttributes addition (consumer compatibility)"
    status: VERIFIED_OK
    notes: "Existing 9 mapEntryToComputer tests still pass. Pure pass-through addition, no behavioral change to other fields. Only one outside-mapper test factory needed update (ComputerDetail.test.tsx makeComputer added rawAttributes: {} default). Grep of DirectoryComputer usage confirmed all sites are reads, no other constructor exists outside the test factory. Full frontend suite 2137/2137 - no regression."
  - id: "R2"
    label: "tooltipParamsFor metadata extraction safety"
    status: VERIFIED_OK
    notes: "Array.isArray narrowing at lines 65 and 71 prevents type errors on malformed metadata. Falls through to empty string interpolation. 'handles ConstrainedDelegation with missing metadata gracefully' test verifies the fallback path. Symmetric Rbcd test would be parity-improving but is low-severity (same code path)."
  - id: "R3"
    label: "ComputerLookup indicator map keying by distinguishedName"
    status: VERIFIED_OK
    notes: "evaluateComputerSecurityIndicatorsBatch keys by computer.distinguishedName (services/securityIndicators.ts:131). renderComputerItem reads indicatorMap.get(computer.distinguishedName) - exact key match. End-to-end test 'propagates indicator set to ComputerDetail when a computer is selected' verifies the round-trip. DN over samAccountName is correct because computer samAccountNames are mangled with trailing $."
  - id: "R4"
    label: "i18next interpolation safety with raw LDAP / SD values (forwarded from QA-14.2)"
    status: VERIFIED_OK_BY_ARCHITECTURE
    notes: "Project-wide config sets escapeValue: false (i18n.ts:46) which is safe for all current consumers because tooltip values flow into the title attribute via React's JSX prop binding. setAttribute path treats the value as text - no HTML parsing, no XSS path possible. Grep for dangerouslySetInnerHTML and innerHTML in ComputerDetail.tsx and ComputerLookup.tsx returned zero matches. The architecture itself eliminates the QA-14.2 escaping concern."

nfr_validation:
  security:
    status: PASS
    notes: "Zero XSS surface by architecture. title attribute is set-only, never parsed. No innerHTML or dangerouslySetInnerHTML in new code (grep verified). Even attacker-controlled SID/SPN content renders as literal text in browser tooltip. Backend Rbcd parser (Story 14.1 extract_dacl_principals) is the trust boundary; UI trusts the parsed result."
  performance:
    status: PASS
    notes: "Batch IPC over typical 50-200 computer visible page in single-digit ms. O(1) Map<dn, set> lookup at row render. tooltipParamsFor is a cheap synchronous Array.isArray + join, no measurable overhead. Backend RBCD adds one base64 decode + SD walk per RBCD-bearing host."
  reliability:
    status: PASS
    notes: "useEffect cancellation honored. try/catch around batch IPC degrades to console.warn (no crash). Array.isArray narrowing prevents type-error crashes on malformed metadata."
  maintainability:
    status: PASS
    notes: "Mirrors Story 14.2 patterns 1:1. tooltipParamsFor is local to page (correct - no other consumer yet). Adding a 4th computer indicator only needs backend detection (Story 14.1) plus an i18n key, no UI change. Foundational rawAttributes addition makes DirectoryComputer symmetric with DirectoryUser."
  accessibility:
    status: PASS
    notes: "Native title for tooltip consistent with project pattern. SecurityIndicatorDot accessibility (tabIndex, count-aware aria-label, Enter/Space toggle, Escape close, focus/blur) inherited unchanged from Story 14.2."

