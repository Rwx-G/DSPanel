residual_risks:
  - id: "R1"
    label: "UAC bit manipulation correctness (bit isolation, no corruption of other bits)"
    status: VERIFIED_OK
    notes: "Bit math `previous & !bits_to_clear` is correct for any subset of UAC bits. Mock tests verify: only target bit cleared from 0x0220 -> 0x0200, TRUSTED_FOR_DELEGATION + ACCOUNTDISABLE preserved when clearing PASSWORD_NOT_REQUIRED, generic mask 0x80000 works (validates Story 14.6 reuse). 22+ defined UAC bits cannot be accidentally corrupted by this code path."
  - id: "R2"
    label: "Idempotent no-op semantics (no audit entry, no LDAP write)"
    status: VERIFIED_OK
    notes: "Both trait-level and command-level tests verify: no clear_uac_bits_calls record, no modify_attribute_calls record, no audit entry 'ClearedPasswordNotRequired'. Snapshot wasted on no-op path is documented inline; accepted trade-off."
  - id: "R3"
    label: "Defense in depth (frontend + backend MFA gate + frontend + backend permission gate)"
    status: VERIFIED_OK
    notes: "4 gates implemented: frontend canEdit (UI hint), backend require_fresh_permission (authoritative), frontend useMfaGate (UI), backend mfa_service.check_mfa_for_action (authoritative). Forged IPC bypass attack rejected by backend permission test."
  - id: "R4"
    label: "Permission re-detection (stale cache demotion attack)"
    status: VERIFIED_OK
    notes: "require_fresh_permission's 'preserve previous level on transient failure' branch only restores cached level when re-detection LOWERS it. The denial check at line 43 still runs against the actual current level. Demotion attack: re-detect succeeds and reflects new lower level -> has_permission returns false -> DENIED. Stale-cache + AD outage scenario: cache stays, denial only if cache happens to be insufficient. Acceptable trade-off documented in helper."
  - id: "R5"
    label: "ResilientDirectoryProvider delegation (retry/timeout/circuit-breaker)"
    status: VERIFIED_OK
    notes: "resilient_directory.rs:291-307 wraps clear_user_account_control_bits in execute_with_resilience (same wrapper as set_password_flags / modify_attribute / create_user). Inherits retry/timeout/circuit-breaker semantics consistent with other write methods."
  - id: "R6"
    label: "Snapshot before write (rollback capability)"
    status: VERIFIED_OK
    notes: "account.rs:441 capture_snapshot runs BEFORE the provider call at line 444. Test test_clear_password_not_required_captures_snapshot asserts state.snapshot_service.count() == 1 after a successful clear."
  - id: "R7"
    label: "i18n completeness (5 languages, no orphan keys, interpolation preserved)"
    status: VERIFIED_OK
    notes: "176 translation completeness tests pass: no missing keys, no orphans, no empty values, {{name}} and {{error}} interpolation preserved across en/fr/de/it/es. Bit identifier '0x0020' and 'PASSWORD_NOT_REQUIRED' present in all 5 language bodies for operator verification."

nfr_validation:
  security:
    status: PASS
    notes: "Defense in depth at 4 gates (frontend canEdit + backend require_fresh_permission + frontend useMfaGate + backend mfa_service.check_mfa_for_action). Audit chain captures every success and failure via SHA-256 hash chain. Snapshot before write enables rollback. Bit mask isolation tested. No secrets logged - only UAC hex values in audit details. No new attack surface beyond a permission-gated single-attribute write."
  performance:
    status: PASS
    notes: "Per-fix cost: 4 LDAP round trips (permission re-detection + snapshot + UAC read + UAC write). No-op early return saves the write but not the other 3 calls. Acceptable for an interactive operator action."
  reliability:
    status: PASS
    notes: "ResilientDirectoryProvider wrapping inherits retry/timeout/circuit-breaker. Idempotent no-op handles operator double-click + race conditions. Snapshot before write enables rollback. Error path: log_failure recorded, AppError::Directory propagated to UI."
  maintainability:
    status: PASS
    notes: "Generic trait method usable by Story 14.6 with zero new trait surface. Dialog mirrors PasswordResetDialog structure exactly. Discriminated-union state machine (activeQuickFix: PasswordNotRequired | null) is forward-extensible for Stories 14.5/14.6. All public types documented."
  accessibility:
    status: PASS
    notes: "Fix button has explicit aria-label via i18n (separate from visible text). Dialog uses ariaLabel via DialogShell. Acknowledgement checkbox has explicit label association via wrapping <label>. Cancel button respects loading state. Confirm button disabled state prevents accidental double-submit."

