    - "Optional: add an end-to-end success-path frontend integration test (click Fix -> check checkbox -> confirm -> invoke succeeds -> notification fires -> handleRefresh called). Non-blocking; per-component coverage is adequate."
    - "Backlog: re-evaluate the per-quick-fix i18n key structure after Stories 14.5 and 14.6 land. If all three dialogs end up with the same 8-key shape, factor a shared schema or helper."

