story: "14.4"
story_title: "Quick-Fix - Clear PasswordNotRequired"
gate: PASS
status_reason: "First WRITE operation in Epic 14. All 9 ACs met. Defense in depth realized at 4 gates (canEdit hint + require_fresh_permission authoritative + useMfaGate frontend + mfa_service.check_mfa_for_action backend). Audit chain captures every state change via existing SHA-256 infrastructure. Snapshot before write enables rollback. Generic trait method clear_user_account_control_bits sets up Story 14.6 for zero new backend trait surface. All 7 PO-flagged residual risks verified OK. 23/23 new tests pass; full backend 1635/1635, full frontend 2149/2149; clippy/fmt/lint/tsc all clean."
reviewer: "Quinn (Test Architect)"
updated: "2026-04-26T00:00:00Z"

top_issues:
  - id: "QA-14.4-001"
    severity: low
    finding: "Snapshot is captured on the idempotent no-op path even though no LDAP write occurs. The dev documented this inline as a deliberate trade-off to avoid an extra trait method (get_user_account_control on the trait) just for a marginal optimization. Cost is one wasted get_all_attributes LDAP call per double-clicked Fix. Story 14.6 will share the same trade-off."
    suggested_action: "Optional - expose a UAC peek helper on the trait so the command can pre-check the no-op path without capturing a snapshot. Track as Story 14.6 / Epic 14 follow-up since both quick-fix-UAC stories share the optimization."
    blocking: false
    suggested_owner: dev
  - id: "QA-14.4-002"
    severity: low
    finding: "End-to-end success-path frontend integration test missing. The flow (click Fix → check checkbox → confirm → invoke succeeds → notification fires → handleRefresh called) is split across UserDetail tests (button + dialog open) and Dialog tests (confirm calls invoke + onSuccess). End-to-end is implicit, not asserted as a single flow."
    suggested_action: "Optional - add a UserLookup-level integration test that asserts the full happy path including the post-success refresh. Non-blocking; current per-component coverage is adequate."
    blocking: false
    suggested_owner: dev
  - id: "QA-14.4-003"
    severity: low
    finding: "i18n sub-namespace structure (title/body/checkboxLabel/confirmButton/fixButton/fixButtonAriaLabel/successNotification/failureNotification) will be repeated for Stories 14.5 and 14.6. Could be deduplicated once the pattern stabilizes."
    suggested_action: "Track for backlog - re-evaluate once 14.5 and 14.6 land. If the structure is identical across all three quick-fix dialogs, factor a shared schema."
    blocking: false
    suggested_owner: po

