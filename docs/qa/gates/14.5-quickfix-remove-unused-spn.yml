residual_risks:
  - id: "R1"
    label: "System-SPN guard parity Rust↔TS"
    status: VERIFIED_OK
    notes: "Both files: SAME 12 prefixes in SAME order with SAME case. Both implementations: case-insensitive prefix-equality (NOT substring), same conservative-bias on no-slash inputs. 19 Rust + 21 TS verbatim-port tests cover identical inputs producing identical results. 'Keep in sync' warning comments in both files."
  - id: "R2"
    label: "Multi-valued attribute write semantics (Mod::Replace not Mod::Delete)"
    status: VERIFIED_OK
    notes: "ldap_directory.rs:2738-2763 modify_attribute uses Mod::Replace(attr_name, HashSet<String>) - exactly the prescribed pattern. Mod::Delete is not used (avoids the case-folding gotcha the story Dev Notes warned about)."
  - id: "R3"
    label: "Empty-after-removal (Mod::Replace with empty HashSet → AD attribute deletion)"
    status: VERIFIED_OK
    notes: "account.rs passes the new Vec<String> (which can be empty) to modify_attribute. ldap_directory.rs:2746 collects into a HashSet (empty Vec → empty HashSet). Test test_remove_user_spns_all_removed_writes_empty_set verifies the empty Vec is forwarded correctly to modify_attribute_calls."
  - id: "R4"
    label: "System-SPN bypass attack via forged IPC"
    status: VERIFIED_OK
    notes: "The system-SPN filter at account.rs:522-530 runs UNCONDITIONALLY - it does NOT depend on what the frontend filtered. A forged IPC call passing system SPNs lands in blocked_system, NOT in the LDAP write. Test test_remove_user_spns_blocks_system_spns verifies with mixed user + system input."
  - id: "R5"
    label: "Idempotent no-op when SPN not in current set"
    status: VERIFIED_OK
    notes: "account.rs:525-527 only adds to approved if current_set.contains(spn). account.rs:547-556 returns early when new_set.len() == current.len() WITHOUT capture_snapshot or audit. Test test_remove_user_spns_idempotent_when_spn_not_present verifies no LDAP write, no audit entry."
  - id: "R6"
    label: "All-system-blocked no-op"
    status: VERIFIED_OK
    notes: "When all requested SPNs are system-flagged, approved is empty → new_set == current → idempotent no-op path returns early. Test test_remove_user_spns_all_system_no_op verifies no LDAP write, no audit entry, no snapshot."
  - id: "R7"
    label: "Audit chain hash determinism (sorted-alphabetical lists)"
    status: VERIFIED_OK
    notes: "account.rs:540-545 explicit removed_sorted.sort(), kept_sorted.sort(), blocked_sorted.sort() before formatting. Test test_remove_user_spns_audit_details_sorted passes inputs in non-alphabetic order and asserts sorted output. SHA-256 chain hash is deterministic regardless of input order."
  - id: "R8"
    label: "Permission re-detection (stale cache demotion attack)"
    status: VERIFIED_OK
    notes: "Same require_fresh_permission helper as Story 14.4. Re-detects permissions before each invocation; preserves cached level only on transient AD failures. Denial path runs against actual current level - demotion correctly blocks the call."
  - id: "R9"
    label: "i18next plural variants in 5 languages"
    status: VERIFIED_OK
    notes: "userDetail.json (5 languages) all contain successNotification_one and successNotification_other. Translation completeness suite (176 tests) enforces parity. {{count}} and {{name}} interpolation preserved across all languages."
  - id: "R10"
    label: "No unwrap() outside tests"
    status: VERIFIED_OK
    notes: "Grep on src-tauri/src/services/spn.rs returned zero unwrap() calls. Grep on production parts of src-tauri/src/commands/account.rs returned zero unwrap() calls (only test code at lines 1023+ uses unwrap). Dialog component uses optional chaining + ?? defaults instead of unwrap. No innerHTML or dangerouslySetInnerHTML in dialog (XSS surface = zero)."

nfr_validation:
  security:
    status: PASS
    notes: "Defense in depth at 5 gates (canEdit + require_fresh_permission + useMfaGate + mfa_service.check_mfa_for_action + system-SPN policy filter on BOTH sides). Forged IPC bypass attack rejected. Audit chain captured every state change with SHA-256 hash chain integrity. Cross-language parity ensures UX guard cannot drift from security guard. Sorted-alphabetical audit details produce deterministic chain hash. No unwrap() outside tests, no innerHTML."
  performance:
    status: PASS
    notes: "Per-fix cost: 4 LDAP round trips (permission re-detection + snapshot + SPN read + SPN write). BETTER than Story 14.4: no-op path skips both snapshot AND write (3 calls saved on no-op vs 14.4). get_user_spns is a Base-scope search asking for one attribute (<10ms). modify_attribute is a single Mod::Replace."
  reliability:
    status: PASS
    notes: "ResilientDirectoryProvider wrapping inherits retry/timeout/circuit-breaker for both new read and existing write. Idempotent no-op handles double-clicks + race conditions. All-system-blocked no-op also handled. Empty-after-removal correctly maps to attribute deletion. Snapshot before write enables rollback. log_failure on directory error."
  maintainability:
    status: PASS
    notes: "Generic trait method get_user_spns reusable. Mirrors Story 14.4 patterns - team familiarity. Cross-language sync warning comments. Discriminated union state machine extensible for Story 14.6. All public types documented. 67 new tests provide regression safety."
  accessibility:
    status: PASS
    notes: "Manage SPNs button has explicit aria-label via i18n. Dialog uses ariaLabel via DialogShell. Each removable checkbox has aria-label set to the SPN string. System-SPN rows have title tooltip. Confirm button disabled state prevents accidental empty-selection submit. Cancel button respects loading state."

