schema: 1
story: "14.5"
story_title: "Quick-Fix - Remove Unused SPN"
gate: PASS
status_reason: "Second WRITE operation in Epic 14. All 10 ACs met. Defense in depth realized at 5 gates (canEdit + require_fresh_permission + useMfaGate + mfa_service.check_mfa_for_action + system-SPN policy filter on BOTH client + server). Cross-language Rust↔TS guard parity verified by 19+21 verbatim-port tests. Multi-valued attribute write goes through Mod::Replace(attr, HashSet) - no Mod::Delete case-folding pitfall. Audit chain integrity preserved via sorted-alphabetical details. All 10 PO-flagged residual risks verified OK. 67/67 new tests pass; full backend 1666/1666, full frontend 2185/2185; clippy/fmt/lint/tsc all clean."
reviewer: "Quinn (Test Architect)"
updated: "2026-04-26T00:00:00Z"

top_issues:
  - id: "QA-14.5-001"
    severity: low
    finding: "Audit failure path only logs log_failure when modify_attribute returns Err. If get_user_spns (the read) fails earlier, the function returns AppError::Directory but does NOT call log_failure first. Story 14.4 has the same gap on its own read path."
    suggested_action: "Optional - extend the audit-failure path to log_failure on get_user_spns error too, so transient AD outages are visible in the audit trail. Track as a future audit-completeness pass spanning all quick-fix commands."
    blocking: false
    suggested_owner: dev
  - id: "QA-14.5-002"
    severity: low
    finding: "SYSTEM_SPN_PREFIXES is duplicated across src-tauri/src/services/spn.rs and src/utils/spn.ts with explicit 'Keep in sync' warning comments. Currently relies on verbatim-port test suites as a tripwire (19 Rust + 21 TS tests would fail loudly if the lists drift). No build-time enforcement."
    suggested_action: "Optional - add a CI check that diffs the two lists. Low priority: the verbatim-port tests are an effective tripwire and the 12-prefix list is small."
    blocking: false
    suggested_owner: dev
  - id: "QA-14.5-003"
    severity: low
    finding: "Story 14.5 introduces a no-op-before-snapshot optimization (skips capture_snapshot when no state change is going to happen). Story 14.4 always captures the snapshot on no-op paths."
    suggested_action: "Optional - retro-apply the same pattern to Story 14.4's clear_password_not_required_inner. Saves one get_all_attributes LDAP call per operator double-click. Worth doing once Story 14.6 lands and shares the same trade-off."
    blocking: false
    suggested_owner: dev

