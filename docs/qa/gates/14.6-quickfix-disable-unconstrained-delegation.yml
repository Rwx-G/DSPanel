schema: 1
story: "14.6"
story_title: "Quick-Fix - Disable Unconstrained Delegation"
gate: PASS
status_reason: "Last quick-fix in Epic 14, highest permission bar (Admin). All 9 ACs met. Defense in depth at 4 gates with permission alignment frontend ↔ backend (no drift). Reused Story 14.4's clear_user_account_control_bits trait method - zero new backend trait surface, generic architecture from 14.4 paid off. AuditSeverity::Critical structural field amendment deferred to a future Epic 11 story with documented rationale; Critical-severity dimension encoded in the unique action name 'DisabledUnconstrainedDelegation' (grep verified - only in new code). All 10 PO-flagged residual risks verified OK. 22/22 new tests pass; full backend 1673/1673, full frontend 2200/2200; clippy/fmt/lint/tsc all clean. No identifying client/customer names anywhere."
reviewer: "Quinn (Test Architect)"
updated: "2026-04-26T00:00:00Z"

top_issues:
  - id: "QA-14.6-001"
    severity: low
    finding: "AuditSeverity::Critical structural field on AuditEntry is deferred to a future Epic 11 amendment. Critical-severity dimension is encoded in the unique action name 'DisabledUnconstrainedDelegation' for v1. The action-name encoding works but is fragile to typos in syslog rules and does not help generic severity-aware audit consumers (SIEM dashboards, severity-filtered queries)."
    suggested_action: "Optional - land the structural AuditSeverity field as a future Epic 11 amendment when AuditEntry needs other structural changes (consolidates the SQLite migration cost). Current encoding is acceptable for v1; the SOC tail/grep workflow on the unique action name is unambiguous."
    blocking: false
    suggested_owner: dev
  - id: "QA-14.6-002"
    severity: low
    finding: "No automated check that audit action names are globally unique. A future story accidentally introducing a collision with 'DisabledUnconstrainedDelegation' would silently break the SOC's ability to identify Critical-severity entries by string match."
    suggested_action: "Optional - add a build-time uniqueness check (simple script grepping for duplicate string literals in log_success / log_failure call sites in commands/*.rs)."
    blocking: false
    suggested_owner: dev
  - id: "QA-14.6-003"
    severity: low
    finding: "Per-test `vi.spyOn(permMod, 'usePermissions').mockReturnValue(...)` boilerplate is repeated across 4 of the 5 new ComputerDetail tests. Could be factored into a `withPermission(level)` test helper."
    suggested_action: "Optional - factor the per-test mock setup into a shared helper. Trivial test cleanup, no functional impact."
    blocking: false
    suggested_owner: dev

