residual_risks:
  - id: "R1"
    label: "Permission gate alignment (frontend canEditCritical ↔ backend require_fresh_permission)"
    status: VERIFIED_OK
    notes: "Both use PermissionLevel::Admin - same enum value, no drift possible. Tests assert ReadOnly + HelpDesk + AccountOperator denied at both layers. Even if a stale UI cache shows the button at AccountOperator, backend re-detection rejects (defense in depth)."
  - id: "R2"
    label: "Generic trait method reuse with mask 0x80000"
    status: VERIFIED_OK
    notes: "Story 14.4's test_clear_uac_bits_works_with_any_mask explicitly verifies mask 0x80000 (TRUSTED_FOR_DELEGATION). Story 14.6's test_disable_unconstrained_delegation_succeeds_for_admin verifies the end-to-end chain: previous=0x80020, mask=0x80000, new=0x00020 (correct bit math)."
  - id: "R3"
    label: "AuditSeverity deferral + action-name uniqueness"
    status: VERIFIED_OK
    notes: "DisabledUnconstrainedDelegation and DisableUnconstrainedDelegationFailed are UNIQUE in the codebase (grep returned only the new command + tests). SOC tail/grep is unambiguous. Deferral documented in Completion Notes with cost analysis. Audit chain SHA-256 integrity preserved - the deferral only affects structural typing of severity."
  - id: "R4"
    label: "Snapshot trade-off (carried from 14.4)"
    status: VERIFIED_OK
    notes: "Snapshot captured at account.rs:507 BEFORE the trait call at line 510. Rollback semantics preserved. Same wasted-on-no-op trade-off as Story 14.4. Documented inline with cross-reference to Story 14.5's optimization (tracked in QA-14.5-003)."
  - id: "R5"
    label: "Idempotent no-op"
    status: VERIFIED_OK
    notes: "Test test_disable_unconstrained_delegation_idempotent_no_op: UAC=0x00020 (already clear) → no clear_uac_bits_calls record → no LDAP write → no audit entry → returns Ok. Command logic at lines 514-521 returns early on previous == new without calling log_success."
  - id: "R6"
    label: "Unrelated UAC bit preservation"
    status: VERIFIED_OK
    notes: "Test test_disable_unconstrained_delegation_preserves_unrelated_uac_bits: UAC=0x82020 → only 0x80000 cleared → new=0x02020. Bits at 0x2000 and 0x0020 (ACCOUNTDISABLE) survive. Story 14.4's test_clear_uac_bits_preserves_unrelated_bits already covered the general case."
  - id: "R7"
    label: "ComputerDetail refresh wiring"
    status: VERIFIED_OK
    notes: "ComputerDetail.tsx onSuccess calls onRefresh?.(). ComputerLookup.tsx wires onRefresh={refresh} to useBrowse refresh. Existing computerLookup useEffect on `computers` re-runs evaluateComputerSecurityIndicatorsBatch when the list refreshes - the badge naturally disappears once the indicator evaluates against the cleared UAC."
  - id: "R8"
    label: "Body content completeness (AC #2 - 4 mandatory points)"
    status: VERIFIED_OK
    notes: "Grep on EN computerDetail.json body confirmed all 4 mandatory points: 'TGT' (Ticket-Granting Ticket explanation), 'golden ticket via TGT capture' (attack vector), 'constrained delegation (set msDS-AllowedToDelegateTo...' (migration), 'SQL Server linked servers / IIS web apps / SharePoint with Kerberos delegation' (double-hop service examples). Translation completeness suite enforces parity in fr/de/it/es."
  - id: "R9"
    label: "No `unwrap()` in production code"
    status: VERIFIED_OK
    notes: "Grep on src/components/dialogs/DisableUnconstrainedDelegationDialog.tsx returned zero unwrap() calls. Production lines of disable_unconstrained_delegation_inner in account.rs have zero .unwrap() calls (test code uses unwrap which is allowed)."
  - id: "R10"
    label: "No identifying client/customer/deployment names"
    status: VERIFIED_OK
    notes: "Grep for INFORMADIS|LECLERC across the entire repo returned zero matches. New i18n strings, test data, audit details all use generic placeholders (corp.example, srv01, dc01.corp.local, CN=DC01,DC=example,DC=com)."

