[package]
name = "dspanel"
version = "0.2.0"
description = "DSPanel - Synology DSM management panel"
authors = ["Romain G."]
license = "Apache-2.0"
edition = "2021"

[lib]
name = "dspanel_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
